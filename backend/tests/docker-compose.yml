services:
  db:
    image: docker.io/library/postgres:18-alpine
    container_name: fastapi-payroll-test
    environment:
      POSTGRES_DB: payrolldb_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata: