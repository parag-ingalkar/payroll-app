services:
  db:
    image: docker.io/library/postgres:18-alpine
    container_name: fastapi-payroll
    environment:
      POSTGRES_DB: payrolldb
      POSTGRES_USER: payrolluser
      POSTGRES_PASSWORD: payrollpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata: