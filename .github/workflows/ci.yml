name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: payrolldb_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U testuser -d payrolldb_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://testuser:testpassword@localhost:5433/payrolldb_test
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        working-directory: backend
        run: |
          uv sync --locked

      - name: Ruff check
        working-directory: backend
        run: |
          uv run ruff check .

      - name: Pyright
        working-directory: backend
        run: |
          uv run pyright

      - name: Run tests
        working-directory: backend
        run: |
          uv run pytest